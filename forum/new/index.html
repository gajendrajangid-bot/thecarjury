<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New thread — The Car Jury Forum</title>
  <meta name="description" content="Start a new discussion thread on The Car Jury community forum.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://www.thecarjury.com/forum/new/">
  <link rel="stylesheet" href="/forum/forum.css">
  <style>
    .new-thread-wrap {
      max-width: 640px;
      margin: 48px auto;
      padding: 0 16px 64px;
    }
    .char-count-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
      font-size: 12px;
      color: var(--stone-grey);
    }
    .char-count-wrap.over {
      color: var(--jury-red);
    }
    #body-textarea {
      min-height: 240px;
      resize: vertical;
    }
    .category-hint {
      font-size: 12px;
      color: var(--stone-grey);
      margin-top: 4px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<nav class="tcj-nav">
  <div class="tcj-nav-inner">
    <a href="/" class="tcj-wordmark"><span>The</span> Car Jury</a>
    <div class="tcj-nav-links">
      <a href="/reviews/" class="tcj-nav-link">Reviews</a>
      <a href="/compare/" class="tcj-nav-link">Compare</a>
      <a href="/forum/" class="tcj-nav-link active">Forum</a>
    </div>
    <div class="tcj-nav-auth" id="nav-auth">
      <button class="tcj-btn-signin" onclick="location.href='/forum/login/'">Sign in</button>
    </div>
  </div>
</nav>

<div class="new-thread-wrap">

  <a href="/forum/" class="back-link">← Forum</a>

  <div style="margin:20px 0 28px">
    <div class="eyebrow" style="margin-bottom:8px">Community</div>
    <h1 style="font-size:26px;font-weight:700;color:var(--ink-black);margin:0">Start a new thread</h1>
  </div>

  <form id="new-thread-form" onsubmit="handleSubmit(event)" novalidate>

    <div class="form-group">
      <label class="form-label" for="category-select">Category</label>
      <select class="form-input" id="category-select" name="category" required
        style="cursor:pointer;appearance:auto">
        <option value="" disabled selected>Select a category…</option>
      </select>
      <div class="category-hint" id="category-hint"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="title-input">Thread title</label>
      <input class="form-input" type="text" id="title-input" name="title"
        placeholder="Keep it specific. Min 10, max 200 characters."
        minlength="10" maxlength="200" required>
      <div class="char-count-wrap" id="title-count">0 / 200</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="body-textarea">Your post</label>
      <textarea class="form-input" id="body-textarea" name="body"
        placeholder="Write clearly — others are here to make car decisions. Cite your source if you're making a factual claim."
        minlength="20" maxlength="5000" required oninput="updateBodyCount()"></textarea>
      <div class="char-count-wrap" id="body-count">0 / 5000</div>
    </div>

    <div class="form-error" id="form-error" style="display:none"></div>

    <button class="form-submit" type="submit" id="submit-btn">Post thread</button>

  </form>

</div>

<div class="forum-footer">
  <a href="/forum/rules/">Community rules</a> ·
  <a href="/about/">About TCJ</a> ·
  No sponsored reviews. No manufacturer relationships.
</div>

<script>
const API = '/api/forum';

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.style.display = '';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function hideError() {
  document.getElementById('form-error').style.display = 'none';
}

function updateBodyCount() {
  const ta  = document.getElementById('body-textarea');
  const len = ta.value.length;
  const el  = document.getElementById('body-count');
  el.textContent = `${len} / 5000`;
  el.classList.toggle('over', len > 5000);
}

// Wire title count
document.getElementById('title-input').addEventListener('input', function () {
  const len = this.value.length;
  const el  = document.getElementById('title-count');
  el.textContent = `${len} / 200`;
  el.classList.toggle('over', len > 200);
});

async function loadCategories() {
  const res = await fetch(`${API}/categories`).then(r => r.json()).catch(() => null);
  const sel  = document.getElementById('category-select');

  if (!res || !res.categories || res.categories.length === 0) {
    sel.innerHTML = '<option value="" disabled selected>Could not load categories</option>';
    return;
  }

  res.categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.slug;
    opt.textContent = c.name;
    opt.dataset.desc = c.description || '';
    sel.appendChild(opt);
  });

  sel.addEventListener('change', function () {
    const selected = this.options[this.selectedIndex];
    const hint = document.getElementById('category-hint');
    hint.textContent = selected?.dataset?.desc || '';
  });
}

async function checkAuth() {
  const me = await fetch(`${API}/me`, { credentials: 'include' })
    .then(r => r.ok ? r.json() : null).catch(() => null);

  if (!me || !me.user) {
    // Not logged in — redirect to login, preserving return path
    location.href = '/forum/login/?next=/forum/new/';
    return;
  }

  document.getElementById('nav-auth').innerHTML =
    `<a href="/forum/u/${esc(me.user.username)}/" style="font-size:13px;color:var(--ink-black)">${esc(me.user.username)}</a>`;
}

async function handleSubmit(e) {
  e.preventDefault();
  hideError();

  const categorySlug = document.getElementById('category-select').value;
  const title        = document.getElementById('title-input').value.trim();
  const content      = document.getElementById('body-textarea').value.trim();
  const submitBtn    = document.getElementById('submit-btn');

  if (!categorySlug) {
    showError('Please select a category.');
    return;
  }
  if (title.length < 10) {
    showError('Title must be at least 10 characters.');
    return;
  }
  if (title.length > 200) {
    showError('Title must be 200 characters or fewer.');
    return;
  }
  if (content.length < 20) {
    showError('Your post must be at least 20 characters.');
    return;
  }
  if (content.length > 5000) {
    showError('Your post must be 5000 characters or fewer.');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Posting…';

  const res = await fetch(`${API}/thread/new`, {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, categorySlug, content }),
  }).then(r => r.json()).catch(() => null);

  submitBtn.disabled = false;
  submitBtn.textContent = 'Post thread';

  if (!res) {
    showError('Network error. Please try again.');
    return;
  }

  if (res.ok && res.slug) {
    location.href = `/forum/t/${res.slug}/`;
  } else {
    showError(res.error || 'Could not create thread. Please try again.');
  }
}

// Run on load
(async function init() {
  await checkAuth();
  await loadCategories();
})();
</script>
</body>
</html>
