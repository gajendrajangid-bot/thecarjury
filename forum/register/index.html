<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — The Car Jury Forum</title>
  <meta name="description" content="Join The Car Jury community. Create an account to debate verdicts and share ownership stories.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://www.thecarjury.com/forum/register/">
  <link rel="stylesheet" href="/forum/forum.css">
</head>
<body>

<nav class="tcj-nav">
  <div class="tcj-nav-inner">
    <a href="/" class="tcj-wordmark"><span>The</span> Car Jury</a>
    <div class="tcj-nav-links">
      <a href="/reviews/" class="tcj-nav-link">Reviews</a>
      <a href="/compare/" class="tcj-nav-link">Compare</a>
      <a href="/forum/" class="tcj-nav-link active">Forum</a>
    </div>
    <div class="tcj-nav-auth">
      <button class="tcj-btn-signin" onclick="location.href='/forum/login/'">Sign in</button>
    </div>
  </div>
</nav>

<div style="min-height:calc(100vh - 120px);display:flex;align-items:flex-start;justify-content:center;padding:48px 16px 64px">
  <div style="width:100%;max-width:440px">

    <div style="margin-bottom:28px">
      <div class="eyebrow" style="margin-bottom:8px">Community</div>
      <h1 style="font-size:26px;font-weight:700;color:var(--ink-black);margin:0 0 6px">Create your account</h1>
      <p style="font-size:14px;color:var(--stone-grey);margin:0">Already have an account? <a href="/forum/login/" style="color:var(--jury-red);text-decoration:none;font-weight:500">Sign in</a></p>
    </div>

    <div id="success-msg" style="display:none;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:16px 20px;font-size:14px;color:#15803d;line-height:1.5;margin-bottom:20px"></div>

    <form id="register-form" onsubmit="handleRegister(event)" novalidate>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
          placeholder="e.g. carjury_fan" autocomplete="username"
          minlength="3" maxlength="30" required>
        <div style="font-size:12px;color:var(--stone-grey);margin-top:4px">3–30 characters. Letters, numbers, and underscores only.</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email"
          placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
          placeholder="Min 8 characters" autocomplete="new-password" minlength="8" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm password</label>
        <input class="form-input" type="password" id="confirm-password" name="confirm-password"
          placeholder="Repeat your password" autocomplete="new-password" minlength="8" required>
      </div>

      <div class="form-error" id="form-error" style="display:none"></div>

      <button class="form-submit" type="submit" id="submit-btn">Create account</button>

    </form>

    <p style="margin-top:20px;font-size:13px;color:var(--stone-grey);text-align:center;line-height:1.5">
      By creating an account you agree to our <a href="/forum/rules/" style="color:var(--ink-black)">community rules</a>.
    </p>

  </div>
</div>

<div class="forum-footer">
  <a href="/forum/rules/">Community rules</a> ·
  <a href="/about/">About TCJ</a> ·
  No sponsored reviews. No manufacturer relationships.
</div>

<script>
const API = '/api/forum';

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.style.display = '';
}

function hideError() {
  const el = document.getElementById('form-error');
  el.style.display = 'none';
}

async function handleRegister(e) {
  e.preventDefault();
  hideError();

  const username        = document.getElementById('username').value.trim();
  const email           = document.getElementById('email').value.trim();
  const password        = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  const submitBtn       = document.getElementById('submit-btn');

  // Client-side validation
  if (!/^[a-zA-Z0-9_]{3,30}$/.test(username)) {
    showError('Username must be 3–30 characters and contain only letters, numbers, and underscores.');
    return;
  }
  if (!email || !email.includes('@')) {
    showError('Please enter a valid email address.');
    return;
  }
  if (password.length < 8) {
    showError('Password must be at least 8 characters.');
    return;
  }
  if (password !== confirmPassword) {
    showError('Passwords do not match.');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating account…';

  const res = await fetch(`${API}/auth/register`, {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, email, password }),
  }).then(r => r.json()).catch(() => null);

  submitBtn.disabled = false;
  submitBtn.textContent = 'Create account';

  if (!res) {
    showError('Network error. Please try again.');
    return;
  }

  if (res.ok) {
    document.getElementById('register-form').style.display = 'none';
    const msg = document.getElementById('success-msg');
    msg.textContent = 'Check your email to verify your account.';
    msg.style.display = '';
  } else {
    showError(res.error || 'Registration failed. Please try again.');
  }
}
</script>
</body>
</html>
